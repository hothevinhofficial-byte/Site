            color: var(--text-main);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-container {
            text-align: center; max-width: 600px; width: 100%; margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.6); padding: 25px; border-radius: 24px;
            box-shadow: 0 10px 30px var(--shadow); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .avatar-frame {
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 15px;
            border: 5px solid white; box-shadow: 0 8px 20px rgba(255, 182, 193, 0.6);
            background: linear-gradient(45deg, var(--pink-accent), var(--blue-accent));
            display: flex; align-items: center; justify-content: center;
        }

        .avatar-placeholder { color: white; font-weight: bold; font-size: 1.2rem; }

        .slogan {
            font-size: 1.8rem; font-weight: 700; margin-bottom: 10px;
            background: linear-gradient(45deg, #E91E63, #1E88E5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .web-link {
            font-size: 0.95rem; color: var(--blue-dark); text-decoration: none; font-weight: 600;
            display: inline-block; padding: 6px 16px; background: white; border-radius: 20px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .workspace { display: grid; grid-template-columns: 350px 1fr; gap: 25px; width: 100%; max-width: 1100px; align-items: start; }

        @media (max-width: 850px) { .workspace { grid-template-columns: 1fr; } }

        .sidebar {
            background: rgba(255, 255, 255, 0.85); border-radius: 20px; padding: 15px;
            box-shadow: 0 8px 24px var(--shadow); max-height: 620px; overflow-y: auto;
        }

        .sidebar-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; padding-left: 8px; border-left: 4px solid var(--pink-dark); }

        .lesson-item {
            background: white; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px;
            cursor: pointer; font-weight: 600; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }

        .lesson-item:hover { background: var(--pink-light); transform: translateX(4px); }
        .lesson-item.active { background: linear-gradient(135deg, #FFF0F5 0%, #E6F2FF 100%); border: 1px solid var(--blue-accent); color: var(--blue-dark); }

        .flashcard-area {
            background: rgba(255, 255, 255, 0.75); padding: 35px; border-radius: 20px;
            box-shadow: 0 8px 24px var(--shadow); display: flex; flex-direction: column; align-items: center; min-height: 480px; justify-content: center;
        }

        .current-lesson-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 25px; color: #444; text-align: center; }

        .flashcard-wrapper { perspective: 1000px; width: 100%; max-width: 420px; height: 260px; margin-bottom: 30px; cursor: pointer; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 12px 35px rgba(0,0,0,0.08); border-radius: 24px; }
        .flashcard.flipped { transform: rotateY(180deg); }

        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; text-align: center; }
        .card-front { background: linear-gradient(135deg, #ffffff, var(--pink-light)); border: 2px solid rgba(255, 182, 193, 0.4); }
        .card-back { background: linear-gradient(135deg, #ffffff, var(--blue-light)); border: 2px solid rgba(176, 224, 230, 0.4); transform: rotateY(180deg); }

        .chinese-char { font-size: 4rem; font-weight: bold; color: #222; margin-bottom: 12px; }
        .pinyin { font-size: 1.5rem; color: var(--blue-dark); font-weight: 600; margin-bottom: 12px; }
        .meaning { font-size: 1.35rem; color: #D81B60; font-weight: 700; }
        .hint-text { position: absolute; bottom: 15px; font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .controls { display: flex; align-items: center; gap: 20px; width: 100%; max-width: 420px; justify-content: space-between; }
        .control-btn { background: white; border: 1px solid #ddd; padding: 12px 24px; border-radius: 14px; cursor: pointer; font-weight: 600; color: #555; transition: all 0.2s; }
        .control-btn:hover:not(:disabled) { background: var(--pink-dark); color: white; border-color: var(--pink-dark); }
        .control-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .progress-text { font-size: 1.05rem; font-weight: 700; color: #555; background: white; padding: 6px 16px; border-radius: 20px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.05); }
