<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Trung Cùng Thảo Ly</title>
    <style>
        :root {
            --pink-light: #FFF0F5;
            --pink-accent: #FFB6C1;
            --pink-dark: #FF69B4;
            --blue-light: #E6F2FF;
            --blue-accent: #B0E0E6;
            --blue-dark: #4682B4;
            --text-main: #333333;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            /* Màu sắc web: Hồng ombre lam nhạt */
            background: linear-gradient(135deg, #FFE4E1 0%, #E8F0FE 50%, #D4E6F1 100%);
            min-height: 100vh;
            color: var(--text-main);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Khung chứa Slogan & Logo hình tròn */
        .hero-container {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.6);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px var(--shadow);
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        /* Ảnh nền slogan dạng khung tròn */
        .avatar-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.6);
            background: linear-gradient(45deg, var(--pink-accent), var(--blue-accent));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-placeholder {
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .slogan {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #E91E63, #1E88E5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .web-link {
            font-size: 1rem;
            color: var(--blue-dark);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
            display: inline-block;
            padding: 6px 16px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .web-link:hover {
            color: var(--pink-dark);
        }

        /* Các mục HSK1, HSK2, HSK3 */
        .hsk-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 900px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px var(--shadow);
            text-align: center;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--pink-dark) 0%, #FF85A2 100%);
            color: white;
            transform: translateY(-2px);
        }

        .tab-btn.disabled {
            background: #E0E0E0;
            color: #999;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Bố cục làm việc chính */
        .workspace {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 900px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        /* Menu Sổ Dọc các bài học bên trái */
        .sidebar {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 24px var(--shadow);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-height: 500px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #555;
            margin-bottom: 12px;
            padding-left: 5px;
            border-left: 4px solid var(--pink-dark);
        }

        .lesson-item {
            background: white;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid transparent;
        }

        .lesson-item:hover {
            background: var(--pink-light);
            border-color: var(--pink-accent);
            transform: translateX(3px);
        }

        .lesson-item.active {
            background: linear-gradient(135deg, #FFF0F5 0%, #E6F2FF 100%);
            border-color: var(--blue-accent);
            color: var(--blue-dark);
        }

        /* Khu vực Flashcard từ vựng */
        .flashcard-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .current-lesson-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #444;
            text-align: center;
        }

        /* Hiệu ứng lật thẻ 3D */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            max-width: 380px;
            height: 240px;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .card-front {
            background: linear-gradient(135deg, #ffffff 0%, var(--pink-light) 100%);
            border: 2px solid rgba(255, 182, 193, 0.4);
        }

        .card-back {
            background: linear-gradient(135deg, #ffffff 0%, var(--blue-light) 100%);
            border: 2px solid rgba(176, 224, 230, 0.4);
            transform: rotateY(180deg);
        }

        .chinese-char {
            font-size: 3.5rem;
            font-weight: bold;
            color: #222;
            margin-bottom: 10px;
        }

        .pinyin {
            font-size: 1.4rem;
            color: var(--blue-dark);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .meaning {
            font-size: 1.3rem;
            color: #FF1493;
            font-weight: 700;
        }

        .hint-text {
            position: absolute;
            bottom: 12px;
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
        }

        /* Thanh điều khiển Chuyển từ */
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 380px;
            justify-content: space-between;
        }

        .control-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 3px 6px var(--shadow);
            color: #555;
        }

        .control-btn:hover:not(:disabled) {
            background: var(--pink-dark);
            color: white;
            border-color: var(--pink-dark);
        }

        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .progress-text {
            font-size: 1rem;
            font-weight: 600;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="avatar-frame">
            <div class="avatar-placeholder">Thảo Ly</div>
        </div>
        <h1 class="slogan">Học Tiếng Trung Cùng Thảo Ly</h1>
        <a href="https://tiengtrungthaoly.vn" target="_blank" class="web-link">tiengtrungthaoly.vn</a>
    </div>

    <div class="hsk-tabs">
        <button class="tab-btn active" id="tab-hsk1">HSK 1</button>
        <button class="tab-btn disabled" disabled>HSK 2 (Khóa)</button>
        <button class="tab-btn disabled" disabled>HSK 3 (Khóa)</button>
    </div>

    <div class="workspace">
        <div class="sidebar" id="lesson-sidebar">
            <div class="sidebar-title">Danh sách bài học (HSK 1)</div>
        </div>

        <div class="flashcard-area">
            <div class="current-lesson-title" id="lesson-title">Đang tải...</div>
            
            <div class="flashcard-wrapper" onclick="flipCard()">
                <div class="flashcard" id="card">
                    <div class="card-face card-front">
                        <div class="chinese-char" id="card-char">-</div>
                        <div class="hint-text">Bấm để xem nghĩa</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="pinyin" id="card-pinyin">-</div>
                        <div class="meaning" id="card-meaning">-</div>
                        <div class="hint-text">Bấm để xem chữ Hán</div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" id="btn-prev" onclick="prevWord()">← Trước</button>
                <span class="progress-text" id="card-progress">0 / 0</span>
                <button class="control-btn" id="btn-next" onclick="nextWord()">Sau →</button>
            </div>
        </div>
    </div>

    <script>
        // Dữ liệu mẫu nạp sẵn từ giáo trình Tân HSK 1
        const hsk1Data = {
            1: {
                title: "Bài 1: AI小语, 你好! (Chào bạn!)",
                words: [
                    { char: "你好", pinyin: "nǐ hǎo", meaning: "Chào bạn" },
                    { char: "您", pinyin: "nín", meaning: "Ngài, ông, bà (kính trọng)" },
                    { char: "你们", pinyin: "nǐmen", meaning: "Các bạn" },
                    { char: "对不起", pinyin: "duìbuqǐ", meaning: "Xin lỗi" },
                    { char: "没关系", pinyin: "méiguānxi", meaning: "Không sao đâu" },
                    { char: "谢谢", pinyin: "xièxie", meaning: "Cảm ơn" }
                ]
            },
            2: {
                title: "Bài 2: 我叫李文 (Tôi tên là Lý Văn)",
                words: [
                    { char: "我", pinyin: "wǒ", meaning: "Tôi, tớ, mình" },
                    { char: "叫", pinyin: "jiào", meaning: "Gọi là, tên là" },
                    { char: "什么", pinyin: "shénme", meaning: "Cái gì" },
                    { char: "名字", pinyin: "míngzi", meaning: "Tên" },
                    { char: "老师", pinyin: "lǎoshī", meaning: "Thầy/Cô giáo" },
                    { char: "学生", pinyin: "xuéshēng", meaning: "Học sinh/Sinh viên" }
                ]
            },
            3: {
                title: "Bài 3: 我是中国人 (Tôi là người Trung Quốc)",
                words: [
                    { char: "是", pinyin: "shì", meaning: "Là" },
                    { char: "中国", pinyin: "Zhōngguó", meaning: "Trung Quốc" },
                    { char: "越南", pinyin: "Yuènán", meaning: "Việt Nam" },
                    { char: "哪", pinyin: "nǎ", meaning: "Nào" },
                    { char: "国", pinyin: "guó", meaning: "Nước, quốc gia" }
                ]
            }
        };

        let currentLesson = 1;
        let currentWordIndex = 0;

        function renderSidebar() {
            const sidebar = document.getElementById('lesson-sidebar');
            sidebar.innerHTML = '<div class="sidebar-title">Danh sách bài học (HSK 1)</div>';
            
            Object.keys(hsk1Data).forEach(key => {
                const item = document.createElement('div');
                item.className = `lesson-item ${key == currentLesson ? 'active' : ''}`;
                item.innerText = hsk1Data[key].title.split('(')[0];
                item.onclick = () => selectLesson(Number(key));
                sidebar.appendChild(item);
            });
        }

        function selectLesson(lessonId) {
            currentLesson = lessonId;
            currentWordIndex = 0;
            renderSidebar();
            updateFlashcard();
        }

        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        function updateFlashcard() {
            const card = document.getElementById('card');
            card.classList.remove('flipped');
            
            const lesson = hsk1Data[currentLesson];
            const word = lesson.words[currentWordIndex];

            document.getElementById('lesson-title').innerText = lesson.title;
            
            setTimeout(() => {
                document.getElementById('card-char').innerText = word.char;
                document.getElementById('card-pinyin').innerText = word.pinyin;
                document.getElementById('card-meaning').innerText = word.meaning;
            }, 150);

            document.getElementById('card-progress').innerText = `${currentWordIndex + 1} / ${lesson.words.length}`;
            document.getElementById('btn-prev').disabled = currentWordIndex === 0;
            document.getElementById('btn-next').disabled = currentWordIndex === lesson.words.length - 1;
        }

        function nextWord() {
            if (currentWordIndex < hsk1Data[currentLesson].words.length - 1) {
                currentWordIndex++;
                updateFlashcard();
            }
        }

        function prevWord() {
            if (currentWordIndex > 0) {
                currentWordIndex--;
                updateFlashcard();
            }
        }

        window.onload = () => {
            renderSidebar();
            updateFlashcard();
        };
    </script>
</body>
</html>
